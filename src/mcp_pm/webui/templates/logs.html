{% extends "base.html" %}
{% block title %}{{ _("Logs") }} — mcp-pm{% endblock %}

{% block content %}
<div class="space-y-6">
    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
        <div>
            <h1 class="text-2xl font-bold text-[#cdd6f4]">Logs</h1>
            <p class="text-sm text-[#6c7086]">Real-time server activity log</p>
        </div>
        <div class="flex gap-3">
            <button class="btn-ghost text-sm"
                    onclick="const el = document.getElementById('log-viewer'); el.scrollTop = 0;">
                ↑ Top
            </button>
            <button class="btn-ghost text-sm"
                    onclick="document.getElementById('log-viewer').textContent = '';">
                Clear
            </button>
            <button class="btn-primary text-sm" id="toggle-logs"
                    onclick="toggleLiveLogs()">
                ⏸ Pause
            </button>
        </div>
    </div>

    <div class="card overflow-hidden">
        <div id="log-viewer"
             class="bg-[#0f0f1a] p-4 font-mono text-xs leading-relaxed h-[600px] overflow-y-auto whitespace-pre-wrap"
             hx-get="/api/logs?tail={{ tail_count }}"
             hx-trigger="every 3s"
             hx-swap="innerHTML"
             hx-target="this">
            {% for line in initial_logs %}
            <div class="log-line">{{ line }}</div>
            {% else %}
            <div class="text-[#6c7086]">Waiting for log entries...</div>
            {% endfor %}
        </div>
    </div>
</div>

<script>
    let logPaused = false;

    function toggleLiveLogs() {
        logPaused = !logPaused;
        const viewer = document.getElementById('log-viewer');
        const btn = document.getElementById('toggle-logs');

        if (logPaused) {
            btn.textContent = '▶ Resume';
            btn.className = 'btn-ghost text-sm';
            htmx.trigger(viewer, 'htmx:abort');
        } else {
            btn.textContent = '⏸ Pause';
            btn.className = 'btn-primary text-sm';
            htmx.trigger(viewer, 'htmx:load');
        }
    }

    // Auto-scroll to top when new logs arrive
    document.body.addEventListener('htmx:afterSwap', function(evt) {
        if (evt.target.id === 'log-viewer' && !logPaused) {
            evt.target.scrollTop = 0;
        }
    });
</script>
{% endblock %}
