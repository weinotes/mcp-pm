<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="'JetBrains Mono', 'SF Mono', Monaco, 'Cascadia Code', monospace" font-size="13">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1b26"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <style>
      .title-bar { fill: #1e1e2e; }
      .title-text { fill: #6c7086; font-size: 11px; font-family: sans-serif; }
      .dot-red { fill: #f7768e; }
      .dot-yellow { fill: #e0af68; }
      .dot-green { fill: #9ece6a; }
      .prompt { fill: #7dcfff; }
      .cmd { fill: #a9b1d6; }
      .output { fill: #565f89; }
      .highlight { fill: #9ece6a; }
      .keyword { fill: #bb9af7; }
      .separator { stroke: #292e42; stroke-width: 1; }
    </style>
  </defs>

  <!-- Window background -->
  <rect x="0" y="0" width="720" height="420" rx="8" fill="url(#bg)"/>
  
  <!-- Title bar -->
  <rect x="0" y="0" width="720" height="32" rx="8" fill="#1e1e2e"/>
  <rect x="0" y="24" width="720" height="8" fill="#1e1e2e"/>
  
  <!-- Traffic lights -->
  <circle cx="16" cy="16" r="5" class="dot-red"/>
  <circle cx="32" cy="16" r="5" class="dot-yellow"/>
  <circle cx="48" cy="16" r="5" class="dot-green"/>
  
  <!-- Title -->
  <text x="360" y="21" text-anchor="middle" class="title-text">mcp-pm — demo</text>

  <!-- Line 1: pip install -->
  <text x="20" y="62" class="prompt">$</text>
  <text x="32" y="62" class="cmd">pip install mcp-pm</text>
  
  <!-- Line 2: install output -->
  <text x="20" y="82" class="output">Successfully installed mcp-pm-0.1.0</text>

  <!-- Line 3: mcp search -->
  <text x="20" y="110" class="prompt">$</text>
  <text x="32" y="110" class="cmd">mcp search filesystem</text>

  <!-- Table header -->
  <text x="20" y="135" class="highlight">Name</text>
  <text x="190" y="135" class="highlight">Description</text>
  <text x="490" y="135" class="highlight">Source</text>
  <text x="600" y="135" class="highlight">Stars</text>
  <line x1="15" y1="142" x2="700" y2="142" class="separator"/>

  <!-- Table rows -->
  <text x="20" y="160" class="keyword">filesystem</text>
  <text x="190" y="160" class="output">Manage files and directories</text>
  <text x="490" y="160" class="output">npm</text>
  <text x="605" y="160" class="output">12k</text>

  <text x="20" y="180" class="keyword">github</text>
  <text x="190" y="180" class="output">Manage repos, issues, PRs</text>
  <text x="490" y="180" class="output">npm</text>
  <text x="605" y="180" class="output">15k</text>

  <text x="20" y="200" class="keyword">brave-search</text>
  <text x="190" y="200" class="output">Web search API integration</text>
  <text x="490" y="200" class="output">npm</text>
  <text x="605" y="200" class="output">8k</text>
  
  <text x="20" y="220" class="keyword">postgres</text>
  <text x="190" y="220" class="output">SQL database explorer</text>
  <text x="490" y="220" class="output">npm</text>
  <text x="605" y="220" class="output">6k</text>

  <line x1="15" y1="228" x2="700" y2="228" class="separator"/>

  <!-- Results count -->
  <text x="20" y="248" class="output">20 result(s) from 5 registries</text>
  
  <!-- Line 4: explore -->
  <text x="20" y="278" class="prompt">$</text>
  <text x="32" y="278" class="cmd">mcp explore</text>
  
  <text x="20" y="298" class="output">→ Web UI running at http://localhost:8080</text>
  
  <!-- Line 5: serve -->
  <text x="20" y="326" class="prompt">$</text>
  <text x="32" y="326" class="cmd">mcp serve --openai</text>
  
  <text x="20" y="346" class="output">→ OpenAI-compatible API at http://localhost:8000/v1</text>

  <!-- Footer -->
  <text x="20" y="385" class="prompt">$</text>
  <text x="32" y="385" class="cmd">mcp --help</text>
  <text x="110" y="385" class="output" font-size="11">12 subcommands · 5 registries · MIT license</text>
  
  <!-- Blinking cursor -->
  <rect x="98" y="373" width="8" height="15" fill="#7dcfff" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
